services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: paperscope-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + dashboard at http://localhost:6333/dashboard
      - "6334:6334"   # gRPC (faster, used by SDK by default)
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: